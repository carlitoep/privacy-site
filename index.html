<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoinGet2Gether</title>
  <style>
    /* --- Grundreset & Schrift --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Arial', sans-serif;
    }

    body {
      background: #ffffff; /* sauberer, heller Hintergrund */
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }

    /* --- Header --- */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 60px;
    }

    header img {
      width: 140px;
      height: auto;
      transition: transform 0.3s;
    }

    header img:hover {
      transform: rotate(-5deg) scale(1.05);
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      color: #0d6efd; /* modernes Blau */
      letter-spacing: -1px;
    }

    p.subtitle {
      font-size: 1.2rem;
      max-width: 600px;
      line-height: 1.6;
      color: #555;
    }

    /* --- Navigation --- */
    nav {
      display: flex;
      gap: 25px;
      margin-bottom: 60px;
    }

    nav a {
      text-decoration: none;
      color: #0d6efd;
      font-weight: 600;
      position: relative;
      transition: all 0.3s ease;
    }

    nav a::after {
      content: '';
      display: block;
      height: 2px;
      width: 0;
      background: #0d6efd;
      transition: width 0.3s;
      position: absolute;
      bottom: -4px;
      left: 0;
    }

    nav a:hover::after {
      width: 100%;
    }

    /* --- Store Buttons --- */
    .store-buttons {
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 80px;
    }

    .store-buttons a img {
      height: 65px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .store-buttons a img:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    /* --- Footer --- */
    footer {
      font-size: 0.9rem;
      color: #888;
      text-align: center;
      margin-top: auto;
    }

    /* --- Responsive --- */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p.subtitle {
        font-size: 1rem;
      }
      nav {
        gap: 15px;
        flex-wrap: wrap;
      }
      .store-buttons a img {
        height: 55px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="/G2G.png" alt="JoinGet2Gether Logo">
    <h1>JoinGet2Gether</h1>
    <p class="subtitle">Finde Events, chatte direkt mit Freunden mit denselben Interessen und erlebe unvergessliche Momente!</p>
  </header>

  <nav>
    <a href="/support.html">Support</a>
    <a href="/privacy.html">Datenschutz</a>
    <a href="/impressum.html">Impressum</a>
  </nav>

  <section class="store-buttons">
    <a href="https://apps.apple.com/us/app/joinget2gether/id6761142354" target="_blank">
      <img src="/appstore-badge.png" alt="Download im App Store">
    </a>
    <a href="https://play.google.com/store/apps/details?id=DEINE_PLAYSTORE_ID" target="_blank">
      <img src="/playstore-badge.png" alt="Download bei Google Play">
    </a>
  </section>

  <footer>
    &copy; 2026 JoinGet2Gether. Alle Rechte vorbehalten.
  </footer>
</body>
</html>
