<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoinGet2Gether</title>
  <style>
    /* Reset & Grundlayout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4a90e2, #50e3c2);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    header {
      margin-bottom: 40px;
    }

    header img {
      width: 150px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: bold;
    }

    p {
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 30px auto;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .store-buttons a {
      display: inline-block;
      text-decoration: none;
    }

    .store-buttons img {
      height: 60px;
      transition: transform 0.2s;
    }

    .store-buttons img:hover {
      transform: scale(1.05);
    }

    footer {
      margin-top: 50px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
      .store-buttons img {
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <header>
    <!-- Logo hier einfügen -->
    <img src="G2G.png" alt="JoinGet2Gether Logo">
    <h1>JoinGet2Gether</h1>
    <p>Die App, die Menschen zusammenbringt. Finde Events, chatte direkt mit Freunden und erlebe unvergessliche Momente!</p>
  </header>

  <section class="store-buttons">
    <!-- Hier deine App Store Links -->
    <a href="https://apps.apple.com/de/app/idDEINE_APPLE_ID" target="_blank">
      <img src="appstore-badge.png" alt="Download im App Store">
    </a>
    <a href="https://play.google.com/store/apps/details?id=DEINE_PLAYSTORE_ID" target="_blank">
      <img src="playstore-badge.png" alt="Download bei Google Play">
    </a>
  </section>

  <footer>
    &copy; 2026 JoinGet2Gether. Alle Rechte vorbehalten.
  </footer>
</body>
</html>
