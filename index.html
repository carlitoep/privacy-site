<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoinGet2Gether</title>
  <style>
    /* Grundlayout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: #f0f4f8; /* heller, neutraler Hintergrund */
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    header {
      margin-bottom: 40px;
    }

    header img {
      width: 160px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      font-weight: bold;
      color: #004488;
    }

    p.subtitle {
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 30px auto;
      line-height: 1.5;
      color: #555;
    }

    nav {
      margin-bottom: 40px;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #0066ff;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #004fcc;
    }

    .store-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .store-buttons a img {
      height: 60px;
      transition: transform 0.2s;
    }

    .store-buttons a img:hover {
      transform: scale(1.05);
    }

    footer {
      font-size: 0.9rem;
      opacity: 0.8;
      text-align: center;
      margin-top: auto;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 1.8rem;
      }
      p.subtitle {
        font-size: 1rem;
      }
      .store-buttons a img {
        height: 50px;
      }
      nav a {
        margin: 0 10px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="/G2G.png" alt="JoinGet2Gether Logo">
    <h1>JoinGet2Gether</h1>
    <p class="subtitle">Finde Events, chatte direkt mit Freunden mit denselben Interessen und erlebe unvergessliche Momente!</p>
  </header>

  <nav>
    <a href="/support.html">Support</a>
    <a href="/privacy.html">Datenschutz</a>
    <a href="/impressum.html">Impressum</a>
  </nav>

  <section class="store-buttons">
    <a href=https://apps.apple.com/us/app/joinget2gether/id6761142354" target="_blank">
      <img src="/appstore-badge.png" alt="Download im App Store">
    </a>
    <a href="https://play.google.com/store/apps/details?id=DEINE_PLAYSTORE_ID" target="_blank">
      <img src="./assets/images/playstore-badge.png" alt="Download bei Google Play">
    </a>
  </section>

  <footer>
    &copy; 2026 JoinGet2Gether. Alle Rechte vorbehalten.
  </footer>
</body>
</html>
