<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoinGet2Gether</title>
  <style>
    /* Reset & Grundlayout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4a90e2, #50e3c2);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: rgba(0,0,0,0.2);
      flex-wrap: wrap;
    }

    header img.logo {
      width: 150px;
      height: auto;
    }

    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #ffd700;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    main h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      font-weight: bold;
    }

    main p {
      font-size: 1.2rem;
      max-width: 700px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .store-buttons a img {
      height: 60px;
      transition: transform 0.2s;
    }

    .store-buttons a img:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.8;
      padding: 20px;
    }

    /* Mobile Menü */
    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
      }
      main h1 {
        font-size: 2.2rem;
      }
      main p {
        font-size: 1rem;
      }
      .store-buttons a img {
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="G2G_transparent.png" alt="JoinGet2Gether Logo" class="logo">
    <nav>
      <a href="/impressum.html">Impressum</a>
      <a href="/privacy-policy.html">Datenschutzerklärung</a>
      <a href="/support.html">Support</a>
    </nav>
  </header>

  <main>
    <h1>JoinGet2Gether</h1>
    <p>Die App, die Menschen zusammenbringt. Finde Events, chatte direkt mit Freunden mit denselben Interessen und erlebe unvergessliche Momente!</p>

    <section class="store-buttons">
      <a href="https://apps.apple.com/de/app/idDEINE_APPLE_ID" target="_blank">
        <img src="appstore-badge.png" alt="Download im App Store">
      </a>
      <a href="https://play.google.com/store/apps/details?id=DEINE_PLAYSTORE_ID" target="_blank">
        <img src="playstore-badge.png" alt="Download bei Google Play">
      </a>
    </section>
  </main>

  <footer>
    &copy; 2026 JoinGet2Gether. Alle Rechte vorbehalten.
  </footer>
</body>
</html>
