<!DOCTYPE html>
<html>
<head>
  <title>Passwort zurücksetzen</title>
</head>
<body>
  <h2>Neues Passwort setzen</h2>

  <input type="password" id="password" placeholder="Neues Passwort" />
  <button id="btn">Speichern</button>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase = createClient(
    "https://toecivfrojqvgurakukq.supabase.co",
    "sb_publishable_EGZ81hAOzsHXi-d2ljBQKg_-mXTSGk9"
  );

  async function init() {
    // 🔥 DAS IST JETZT WIEDER NOTWENDIG
    const { data, error } = await supabase.auth.exchangeCodeForSession(
      window.location.href
    );

    if (error) {
      alert("Session Fehler: " + error.message);
      console.log(error);
    } else {
      console.log("Session gesetzt", data);
    }
  }

  init();

  document.getElementById("btn").addEventListener("click", async () => {
    const password = document.getElementById("password").value;

    if (!password) {
      alert("Bitte Passwort eingeben");
      return;
    }

    const { error } = await supabase.auth.updateUser({
      password: password,
    });

    if (error) {
      alert("Fehler: " + error.message);
    } else {
      alert("Passwort erfolgreich geändert!");
      window.location.href = "https://joinget2gether.com";
    }
  });
</script>
</body>
</html>
