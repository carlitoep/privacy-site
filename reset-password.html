<!DOCTYPE html>
<html>
<head>
  <title>Passwort zurücksetzen</title>
</head>
<body>
  <h2>Neues Passwort setzen</h2>

  <input type="password" id="password" placeholder="Neues Passwort" />
  <button onclick="updatePassword()">Speichern</button>

  <!-- Script direkt im Body -->
  <script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase = createClient(
    "https://YOUR_PROJECT.supabase.co",
    "YOUR_ANON_KEY"
  );

  async function handleReset() {
    const hash = window.location.hash;

    if (!hash) {
      document.body.innerHTML = "<h3>Ungültiger Link</h3>";
      return;
    }

    const { error } = await supabase.auth.exchangeCodeForSession(
      window.location.href
    );

    if (error) {
      alert("Session Fehler: " + error.message);
    }
  }

  handleReset();

  window.updatePassword = async function () {
    const password = document.getElementById("password").value;

    if (!password) {
      alert("Bitte Passwort eingeben");
      return;
    }

    const { error } = await supabase.auth.updateUser({
      password: password,
    });

    if (error) {
      alert("Fehler: " + error.message);
    } else {
      alert("Passwort erfolgreich geändert!");
    }
  };
</script>
</body>
</html>
